<script>
function dbg(msg){
  const box = document.getElementById("debugBox");
  if(!box) return;
  box.style.display = "block";
  box.textContent = String(msg);
}
window.addEventListener("error", (e)=>{
  dbg("Erro JS:\n" + (e.message || e.type) + "\n" + (e.filename||"") + ":" + (e.lineno||"") + ":" + (e.colno||""));
});
window.addEventListener("unhandledrejection", (e)=>{
  dbg("Promise rejeitada:\n" + (e.reason && (e.reason.code || e.reason.message) ? (e.reason.code + " - " + e.reason.message) : String(e.reason)));
});

/* ✅ bloqueios extra de zoom (iOS/desktop) */
document.addEventListener("gesturestart", (e)=>e.preventDefault());
document.addEventListener("gesturechange", (e)=>e.preventDefault());
document.addEventListener("gestureend", (e)=>e.preventDefault());
window.addEventListener("wheel", (e)=>{
  if(e.ctrlKey) e.preventDefault();
}, { passive:false });
</script>

<script>
const VOICE_CMD_KEY = "voice_cmd";
let mesAtual = new Date().toISOString().slice(0,7);

function normalize(text){
  return String(text || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function iaSetStatus(text, ok){
  document.getElementById("iaStatus").textContent = text;
  document.getElementById("iaDot").classList.toggle("ok", !!ok);
}

/* Drawer Sugestões */
function openQuickDrawer(){
  const d = document.getElementById("quickDrawer");
  const b = document.getElementById("quickBackdrop");
  if(!d || !b) return;
  d.classList.add("open");
  b.classList.add("open");
  d.setAttribute("aria-hidden", "false");
}
function closeQuickDrawer(){
  const d = document.getElementById("quickDrawer");
  const b = document.getElementById("quickBackdrop");
  if(!d || !b) return;
  d.classList.remove("open");
  b.classList.remove("open");
  d.setAttribute("aria-hidden", "true");
}
function toggleQuickDrawer(){
  const d = document.getElementById("quickDrawer");
  if(!d) return;
  d.classList.contains("open") ? closeQuickDrawer() : openQuickDrawer();
}

/* Render estilo ChatGPT: avatar + card */
function iaAdd(role, text){
  const box = document.getElementById("iaChat");

  const row = document.createElement("div");
  row.className = "msgRow " + (role === "me" ? "me" : "bot");

  const avatar = document.createElement("div");
  avatar.className = "msgAvatar " + (role === "me" ? "me" : "bot");
  avatar.textContent = role === "me" ? "VC" : "IA";

  const bubble = document.createElement("div");
  bubble.className = "msg " + (role === "me" ? "me" : "bot");

  const content = document.createElement("div");
  content.className = "msgContent";
  content.textContent = text;

  bubble.appendChild(content);
  row.appendChild(avatar);
  row.appendChild(bubble);

  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function iaQuick(text){
  closeQuickDrawer();          // ✅ fecha o menu
  const ta = document.getElementById("iaPrompt");
  ta.value = text;
  ta.focus();
  iaAutoResize();
}

function getMesAtualAberto(){
  const opened = localStorage.getItem("mes_aberto");
  if(opened) mesAtual = opened;
  return mesAtual;
}

function buildIaContextObject(){
  const mes = getMesAtualAberto();
  const d = App.getDataMes(mes);

  const salary = Number(d.salary || 0);
  const spent = (d.items || []).reduce((a,b)=>a + Number(b.amount || 0), 0);
  const saved = (d.saved || []).reduce((a,b)=>a + Number(b.value || 0), 0);
  const left = salary - spent;

  const byCat = {};
  (d.items || []).forEach(it=>{
    const cat = it.category || "Outros";
    byCat[cat] = (byCat[cat] || 0) + Number(it.amount || 0);
  });

  const topCats = Object.entries(byCat)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .map(([cat,val])=>({ cat, val }));

  const pendentes = (d.items || []).filter(it => !it.paid).slice(0,10).map(it=>({
    desc: it.desc || "",
    amount: Number(it.amount || 0),
    category: it.category || "Outros"
  }));

  return {
    mes,
    salary,
    spent,
    saved,
    left,
    topCats,
    pendentes,
    totalItems: (d.items || []).length
  };
}

function buildIaContextText(){
  const c = buildIaContextObject();

  return [
    `Mês aberto: ${c.mes}`,
    `Salário: ${c.salary}`,
    `Gasto total: ${c.spent}`,
    `Guardado: ${c.saved}`,
    `Sobra: ${c.left}`,
    `Quantidade de lançamentos: ${c.totalItems}`,
    `Top categorias: ${c.topCats.map(x => `${x.cat}=${x.val}`).join(", ") || "sem dados"}`,
    `Pendentes: ${c.pendentes.map(x => `${x.desc}=${x.amount}`).join(", ") || "nenhum"}`
  ].join("\n");
}

/* Contexto não aparece na tela, mas atualiza o hint */
function renderContextPreview(){
  const c = buildIaContextObject();
  document.getElementById("iaHint").textContent = `Mês aberto: ${c.mes}`;
}

async function callIA(prompt) {
  const base = (window.API_BASE_URL || "").replace(/\/$/, "");
  const resp = await fetch(base + "/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-app-key": window.APP_KEY
    },
    body: JSON.stringify({ prompt }),
    cache: "no-store"
  });

  const data = await resp.json().catch(()=>({}));
  if(!resp.ok){
    throw new Error(data?.error || ("Erro HTTP " + resp.status));
  }

  return data.response || "Sem resposta.";
}

async function iaHealth(){
  try{
    const base = (window.API_BASE_URL || "").replace(/\/$/, "");
    const r = await fetch(base + "/", {
      cache: "no-store",
      headers: { "x-app-key": window.APP_KEY }
    });
    await r.json().catch(()=>({}));
    iaSetStatus("Online ✅", true);
  }catch(e){
    iaSetStatus("Offline", false);
  }
}

async function iaSend(){
  const input = document.getElementById("iaPrompt");
  const q = (input.value || "").trim();
  if(!q) return;

  input.value = "";
  iaAutoResize();

  iaAdd("me", q);
  iaSetStatus("Consultando…", false);

  try{
    const prompt = `Você é a IA PRO, consultor financeiro simples e prático.
Responda sempre em PT-BR.
Use os dados do usuário para dar orientações diretas, claras e úteis.
Não invente valores nem dados.
Não prometa lucro.
Se o mês estiver apertado, diga isso com clareza.
Quando possível, dê passos numerados curtos.

DADOS DO USUÁRIO:
${buildIaContextText()}

PERGUNTA:
${q}`;

    const ans = await callIA(prompt);
    iaAdd("bot", ans);
    iaSetStatus("Online ✅", true);
  }catch(e){
    iaAdd("bot", "Erro ao conectar na IA: " + (e.message || e));
    iaSetStatus("Offline", false);
  }
}

/* Auto-resize do textarea */
function iaAutoResize(){
  const ta = document.getElementById("iaPrompt");
  if(!ta) return;
  ta.style.height = "0px";
  const h = Math.min(ta.scrollHeight, 140);
  ta.style.height = h + "px";
}

function handleVoiceCommand(raw){
  const cmd = normalize(raw);
  if(!cmd) return false;

  if(cmd.includes("tema roxo")){
    localStorage.setItem(App.THEME_KEYS.preset, "purple");
    App.applyThemeSettings();
    return true;
  }
  if(cmd.includes("tema minimal") || cmd.includes("tema mono")){
    localStorage.setItem(App.THEME_KEYS.preset, "mono");
    App.applyThemeSettings();
    return true;
  }
  if(cmd.includes("tema verde")){
    localStorage.setItem(App.THEME_KEYS.preset, "green");
    App.applyThemeSettings();
    return true;
  }
  if(cmd.includes("tema padrao") || cmd.includes("tema padrão")){
    localStorage.setItem(App.THEME_KEYS.preset, "default");
    App.applyThemeSettings();
    return true;
  }
  if(cmd.includes("tema por do sol") || cmd.includes("tema pôr do sol") || cmd.includes("tema sunset")){
    localStorage.setItem(App.THEME_KEYS.preset, "sunset");
    App.applyThemeSettings();
    return true;
  }

  if(cmd.includes("abrir tela principal") || cmd.includes("abrir inicio") || cmd.includes("abrir início") || cmd.includes("ir para home")){
    location.href = "./index.html";
    return true;
  }

  let m = cmd.match(/^pergunta\s+(.+)$/i);
  if(m){
    document.getElementById("iaPrompt").value = m[1] || "";
    iaAutoResize();
    return true;
  }

  if(cmd.includes("enviar ia") || cmd.includes("perguntar ia") || cmd.includes("consultar ia")){
    iaSend();
    return true;
  }

  return false;
}

function bindVoiceStorageListener(){
  window.addEventListener("storage", (e)=>{
    if(e.key === VOICE_CMD_KEY && e.newValue){
      const ok = handleVoiceCommand(e.newValue);
      if(ok) localStorage.removeItem(VOICE_CMD_KEY);
    }
  });

  const first = localStorage.getItem(VOICE_CMD_KEY);
  if(first){
    const ok = handleVoiceCommand(first);
    if(ok) localStorage.removeItem(VOICE_CMD_KEY);
  }
}

document.addEventListener("DOMContentLoaded", async ()=>{
  await App.boot(()=>{
    bindVoiceStorageListener();
    renderContextPreview();
    iaHealth();

    const quickBtn = document.getElementById("quickBtn");
    if(quickBtn) quickBtn.addEventListener("click", toggleQuickDrawer);

    iaAdd("bot", "Sou a ia PRO. Posso analisar seu mês, sugerir cortes de gastos, avaliar sua obra e ajudar a montar metas");

    const input = document.getElementById("iaPrompt");
    iaAutoResize();
    input.addEventListener("input", iaAutoResize);

    input.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        iaSend();
      }
    });
  });
});
</script>
</body>
</html>
