<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Gastos Fixos • Controle de Gastos PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#569cff">
<link rel="stylesheet" href="./ui.css">

<style>
:root{
  --bg:#07101f;
  --grad1: rgba(86,156,255,.22);
  --grad2: rgba(57,217,138,.16);
  --grad3: rgba(255,93,93,.12);

  --panel: rgba(255,255,255,.06);
  --panel2: rgba(255,255,255,.08);
  --stroke: rgba(255,255,255,.10);
  --text:#eaf0ff;
  --muted: rgba(234,240,255,.72);
  --accent:#569cff;
  --shadow: 0 18px 60px rgba(0,0,0,.45);
  --glass: blur(14px);
}
.light{
  --panel: rgba(0,0,0,.04);
  --panel2: rgba(0,0,0,.06);
  --stroke: rgba(0,0,0,.08);
  --text:#0d1222;
  --muted: rgba(13,18,34,.68);
  --shadow: 0 18px 60px rgba(0,0,0,.12);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;
  background:
    radial-gradient(1000px 700px at 20% 10%, var(--grad1), transparent 55%),
    radial-gradient(900px 700px at 80% 30%, var(--grad2), transparent 60%),
    radial-gradient(800px 600px at 70% 90%, var(--grad3), transparent 60%),
    var(--bg);
}
.wrap{max-width:980px;margin:auto;padding:16px;padding-bottom:120px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.topbar .left{display:flex;gap:14px;align-items:flex-start}
.brand h1{margin:0;font-size:28px;line-height:1.05;font-weight:900}
.brand .sub{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.15;max-width:180px}
.topActions{display:flex;gap:10px;align-items:center}
.pill{
  display:flex;gap:10px;align-items:center;justify-content:center;
  padding:10px 14px;border-radius:22px;
  border:1px solid var(--stroke);
  min-width:140px;
  min-height:58px;
  font-weight:900;
  background:rgba(255,255,255,.10);
  box-shadow:0 12px 30px rgba(0,0,0,.22);
  color:var(--text);
  text-decoration:none;
}
.pill.smallPill{min-width:110px}
.backRow{display:flex;align-items:center;gap:18px;margin:12px 0 16px}
.backBtn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  min-width:124px;min-height:78px;
  border-radius:28px;
  background:rgba(255,255,255,.10);
  border:1px solid var(--stroke);
  box-shadow:0 12px 30px rgba(0,0,0,.22);
  color:var(--text);
  text-decoration:none;
  font-weight:900;
  font-size:20px;
}
.backTitle{font-size:28px;font-weight:950}
.card{
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  border:1px solid var(--stroke);
  border-radius:32px;
  box-shadow:var(--shadow);
  backdrop-filter:var(--glass);
  padding:28px;
}
.card h2{
  margin:0 0 18px;
  font-size:24px;
  font-weight:900;
}
label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:8px;
}
input,select{
  width:100%;
  border-radius:20px;
  padding:18px 18px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,.14);
  color:var(--text);
  outline:none;
  font-size:18px;
}
.light input,.light select{background:rgba(255,255,255,.72)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.btn{
  appearance:none;border:0;cursor:pointer;
  border-radius:22px;
  padding:18px 26px;
  font-size:18px;
  font-weight:900;
  color:#fff;
  background:var(--accent);
  box-shadow:0 18px 40px rgba(0,0,0,.28);
}
.btn.ghost{
  background:rgba(255,255,255,.08);
  border:1px solid var(--stroke);
  color:var(--text);
}
.hr{height:1px;background:var(--stroke);margin:22px 0}
.small{font-size:12px;color:var(--muted)}
.list{display:grid;gap:14px}
.item{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--stroke);
  border-radius:24px;
  padding:18px 20px;
}
.itemLeft{min-width:0}
.itemTitle{font-size:18px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itemMeta{margin-top:6px;color:var(--muted);font-size:14px}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:999px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.08);
  color:var(--text);font-size:13px;
}
.itemRight{display:flex;align-items:center;gap:10px}
.iconBtn{
  width:86px;height:86px;border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);
  border:1px solid var(--stroke);
  color:var(--text);
  font-size:28px;
  cursor:pointer;
}
#debugBox{
  position:fixed; left:12px; right:12px; bottom:12px;
  background:rgba(0,0,0,.78); color:#fff; padding:10px; border-radius:12px;
  font-size:12px; z-index:9999; display:none; white-space:pre-wrap;
}
@media (max-width:720px){
  .brand h1{font-size:24px}
  .backBtn{min-width:124px;min-height:78px}
  .backTitle{font-size:22px}
  .grid2{grid-template-columns:1fr}
  .item{align-items:flex-start}
  .iconBtn{width:74px;height:74px}
}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <div class="left">
      <div class="brand">
        <h1>Controle de<br>Gastos PRO</h1>
        <div class="sub">Aqui fica só o essencial. Para editar categorias, fixos, PDF e simuladores, use o Menu.</div>
      </div>
    </div>
    <div class="topActions">
      <a class="pill" href="./index.html#menu"><span style="font-size:28px">☰</span> <span>Menu</span></a>
      <button class="pill smallPill" type="button" onclick="toggleTheme()">🌙/☀️</button>
    </div>
  </div>

  <div class="backRow">
    <a class="backBtn" href="./index.html?home=1">← Voltar</a>
    <div class="backTitle">Gastos Fixos</div>
  </div>

  <div class="card">
    <h2>Adicionar gasto fixo</h2>

    <div>
      <label>Descrição</label>
      <input id="descFixo" placeholder="Ex: Aluguel">
    </div>

    <div class="grid2" style="margin-top:18px">
      <div>
        <label>Valor</label>
        <input id="valorFixo" type="number" placeholder="Ex: 750">
      </div>
      <div>
        <label>Categoria</label>
        <select id="categoriaFixo"></select>
      </div>
    </div>

    <div class="row" style="margin-top:18px">
      <button class="btn" onclick="addFixo()">Adicionar</button>
    </div>

    <div class="hr"></div>

    <div class="small" style="font-size:15px">
      ⚠️ O X aqui remove do sistema. Na lista do mês, o X remove só daquele mês.
    </div>

    <div class="hr"></div>

    <div id="listaFixos" class="list"></div>
  </div>
</div>

<div id="debugBox"></div>

<script>
function dbg(msg){
  const box = document.getElementById("debugBox");
  if(!box) return;
  box.style.display = "block";
  box.textContent = String(msg);
}
window.addEventListener("error", (e)=>{
  dbg("Erro JS:\n" + (e.message || e.type) + "\n" + (e.filename||"") + ":" + (e.lineno||"") + ":" + (e.colno||""));
});
window.addEventListener("unhandledrejection", (e)=>{
  dbg("Promise rejeitada:\n" + (e.reason && (e.reason.code || e.reason.message) ? (e.reason.code + " - " + e.reason.message) : String(e.reason)));
});
</script>

<script>
const DEFAULT_CATEGORIAS = ["Casa","Alimentação","Transporte","Lazer","Pets","Investimentos","Outros"];
const FIXOS_KEY = "fixos_global_v1";
const CAT_KEY = "categorias_global_v1";
const VOICE_CMD_KEY = "voice_cmd";
const VOICE_TS_KEY = "voice_ts";

let categorias = [];
let fixos = [];

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function money(n){
  return Number(n||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}
function uid(){
  return Math.random().toString(16).slice(2) + Date.now().toString(16);
}
function normalize(text){
  return String(text || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}
function loadAll(){
  try{
    const c = JSON.parse(localStorage.getItem(CAT_KEY) || "null");
    categorias = Array.isArray(c) && c.length ? c : [...DEFAULT_CATEGORIAS];
  }catch(e){
    categorias = [...DEFAULT_CATEGORIAS];
  }
  if(!categorias.includes("Investimentos")) categorias.push("Investimentos");

  try{
    const f = JSON.parse(localStorage.getItem(FIXOS_KEY) || "[]");
    fixos = Array.isArray(f) ? f : [];
  }catch(e){
    fixos = [];
  }
}
function saveAll(){
  localStorage.setItem(CAT_KEY, JSON.stringify(categorias));
  localStorage.setItem(FIXOS_KEY, JSON.stringify(fixos));
}
function renderCategorias(){
  const sel = document.getElementById("categoriaFixo");
  sel.innerHTML = categorias.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
}
function renderFixos(){
  const div = document.getElementById("listaFixos");
  if(!fixos.length){
    div.innerHTML = `
      <div class="item">
        <div class="itemLeft">
          <div class="itemTitle">Nenhum gasto fixo ainda</div>
          <div class="itemMeta">Adicione acima ou use o comando de voz.</div>
        </div>
      </div>
    `;
    return;
  }

  div.innerHTML = fixos.map((f,idx)=>`
    <div class="item">
      <div class="itemLeft">
        <div class="itemTitle">${escapeHtml(f.desc)}</div>
        <div class="itemMeta">
          ${money(f.amount)}
          <span class="badge" style="margin-left:10px">${escapeHtml(f.category)}</span>
        </div>
      </div>
      <div class="itemRight">
        <button class="iconBtn" title="Remover" onclick="removeFixo(${idx})">✕</button>
      </div>
    </div>
  `).join("");
}
function addFixo(){
  const desc = (document.getElementById("descFixo").value || "").trim();
  const amount = Number(document.getElementById("valorFixo").value || 0);
  const category = document.getElementById("categoriaFixo").value || "Outros";

  if(!desc) return alert("Digite a descrição.");
  if(!amount || amount <= 0) return alert("Digite um valor válido.");

  fixos.push({
    id: uid(),
    desc,
    amount,
    category
  });

  saveAll();
  renderFixos();

  document.getElementById("descFixo").value = "";
  document.getElementById("valorFixo").value = "";
}
function removeFixo(idx){
  if(idx < 0 || idx >= fixos.length) return;
  fixos.splice(idx,1);
  saveAll();
  renderFixos();
}
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}
function applyTheme(){
  const t = localStorage.getItem("theme");
  if(t === "light") document.body.classList.add("light");
}

/* ===== comando de voz desta página ===== */
function consumeVoiceCommand(){
  const raw = localStorage.getItem(VOICE_CMD_KEY);
  if(!raw) return;

  localStorage.removeItem(VOICE_CMD_KEY);
  localStorage.removeItem(VOICE_TS_KEY);

  const cmd = normalize(raw);

  // anote gastos fixos internet 99 casa
  if((cmd.startsWith("anote") || cmd.startsWith("anotar")) && cmd.includes("gastos fixos")){
    const after = raw.split(/gastos fixos/i)[1] ? raw.split(/gastos fixos/i)[1].trim() : "";
    const parts = after.split(/\s+/).filter(Boolean);

    let valIdx = -1;
    for(let i=0;i<parts.length;i++){
      const n = Number(String(parts[i]).replace(",", "."));
      if(!isNaN(n) && n > 0){
        valIdx = i;
        break;
      }
    }

    if(valIdx <= 0 || valIdx >= parts.length - 1) return;

    const desc = parts.slice(0, valIdx).join(" ");
    const amount = Number(String(parts[valIdx]).replace(",", "."));
    const categoryRaw = parts.slice(valIdx + 1).join(" ").trim();

    let category = categorias.find(c => normalize(c) === normalize(categoryRaw));
    if(!category) category = categoryRaw ? categoryRaw.charAt(0).toUpperCase() + categoryRaw.slice(1) : "Outros";
    if(!categorias.includes(category)) categorias.push(category);

    fixos.push({
      id: uid(),
      desc,
      amount,
      category
    });

    saveAll();
    renderCategorias();
    renderFixos();
    return;
  }

  // remover gasto fixo internet
  if(cmd.startsWith("remover gasto fixo") || cmd.startsWith("apagar gasto fixo") || cmd.startsWith("excluir gasto fixo")){
    const nome = raw.replace(/^(remover|apagar|excluir)\s+gasto\s+fixo\s+/i, "").trim();
    const idx = fixos.findIndex(f => normalize(f.desc) === normalize(nome));
    if(idx >= 0){
      fixos.splice(idx,1);
      saveAll();
      renderFixos();
    }
  }
}

document.addEventListener("DOMContentLoaded", ()=>{
  applyTheme();
  loadAll();
  renderCategorias();
  renderFixos();
  consumeVoiceCommand();
});
</script>
</body>
</html>
