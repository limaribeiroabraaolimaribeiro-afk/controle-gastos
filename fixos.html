<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Gastos Fixos • Controle de Gastos PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#569cff">
<link rel="stylesheet" href="./ui.css">

<style>
:root{
  --bg: var(--bg, #07101f);
}
#debugBox{
  position:fixed; left:12px; right:12px; bottom:12px;
  background:rgba(0,0,0,.78); color:#fff; padding:10px; border-radius:12px;
  font-size:12px; z-index:9999; display:none; white-space:pre-wrap;
}
.wrap{max-width:980px;margin:0 auto;padding:14px}
.topRow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.titleBox{display:flex;flex-direction:column;gap:4px}
.h1{font-size:22px;font-weight:950;line-height:1.1}
.sub{color:var(--muted);font-weight:650;font-size:13px}
.card{
  border:1px solid var(--stroke);
  border-radius:26px;
  background:
    radial-gradient(1200px 800px at 15% 0%, color-mix(in srgb, var(--accent), transparent 82%), transparent 60%),
    radial-gradient(900px 700px at 85% 10%, rgba(57,217,138,.10), transparent 62%),
    linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
  box-shadow:var(--shadow);
  backdrop-filter:var(--glass);
  overflow:hidden;
}
.cardHead{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px;
  border-bottom:1px solid var(--stroke);
}
.pill{
  display:inline-flex;gap:8px;align-items:center;
  padding:8px 10px;border-radius:999px;
  background:rgba(255,255,255,.10);
  border:1px solid var(--stroke);
  font-size:12px;color:var(--muted);
}
.dot{
  width:10px;height:10px;border-radius:999px;background:var(--warn);
  box-shadow:0 0 0 4px rgba(255,209,102,.12);
}
.dot.ok{background:var(--good);box-shadow:0 0 0 4px rgba(57,217,138,.12);}
.body{padding:14px}
.grid{display:grid;grid-template-columns:1.15fr .7fr .7fr .6fr;gap:10px}
@media (max-width:820px){.grid{grid-template-columns:1fr 1fr;}}
.field{
  border:1px solid var(--stroke);
  border-radius:18px;
  background:rgba(255,255,255,.05);
  padding:12px;
}
.field label{display:block;color:var(--muted);font-size:12px;font-weight:700;margin-bottom:6px}
.field input, .field select{
  width:100%;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.12);
  color:var(--text);
  border-radius:14px;
  padding:12px 12px;
  outline:none;
  font-weight:850;
}
.rowBtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.btn{cursor:pointer}
.btn.primary{
  border:0;
  border-radius:18px;
  padding:12px 14px;
  font-weight:950;
  background:
    radial-gradient(140px 110px at 30% 20%, rgba(255,255,255,.25), transparent 60%),
    linear-gradient(135deg, color-mix(in srgb, var(--accent), #fff 10%), color-mix(in srgb, var(--accent), #000 30%));
  color:#07101f;
  box-shadow:0 18px 50px rgba(0,0,0,.35);
}
.btn.ghost{
  border:1px solid var(--stroke);
  border-radius:18px;
  padding:12px 14px;
  font-weight:900;
  background:rgba(255,255,255,.06);
  color:var(--text);
}
.btn.danger{
  border:1px solid rgba(255,93,93,.35);
  background:rgba(255,93,93,.10);
  color:color-mix(in srgb, var(--text), #ff5d5d 18%);
}
.list{
  margin-top:14px;
  display:grid;
  gap:12px;
}
.item{
  border:1px solid var(--stroke);
  border-radius:22px;
  background:rgba(255,255,255,.05);
  padding:12px;
}
.itemTop{
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.itemName{font-weight:950;font-size:16px}
.itemMeta{margin-top:6px;color:var(--muted);font-weight:750;font-size:13px}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:999px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.06);
  font-weight:850;font-size:12px;color:var(--text);
}
.badge.ok{border-color:rgba(57,217,138,.35);background:rgba(57,217,138,.10)}
.badge.warn{border-color:rgba(255,209,102,.35);background:rgba(255,209,102,.10)}
.badge.neutral{opacity:.9}
.itemActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.itemActions .btn{padding:10px 12px;border-radius:16px;font-weight:950}
.small{font-size:12px;color:var(--muted);font-weight:650}
hr.sep{border:0;border-top:1px solid var(--stroke);margin:14px 0}
</style>
</head>

<body>
<div class="wrap">
  <div class="topRow">
    <a class="btn ghost" href="./index.html?home=1">← Voltar</a>
    <div class="titleBox" style="min-width:0">
      <div class="h1">Gastos Fixos</div>
      <div class="sub">Adicione, marque como pago/pendente e remova seus fixos. Comando de voz suportado.</div>
    </div>
    <a class="btn ghost" href="./voz.html" title="Abrir comando de voz">🎙️</a>
  </div>

  <div class="card">
    <div class="cardHead">
      <div style="font-weight:950">Adicionar / editar</div>
      <div class="pill"><span class="dot" id="dot"></span><span id="status">Pronto</span></div>
    </div>

    <div class="body">
      <div class="grid">
        <div class="field">
          <label>Nome do fixo</label>
          <input id="inNome" placeholder="Ex: Internet" autocomplete="off">
        </div>
        <div class="field">
          <label>Valor (R$)</label>
          <input id="inValor" placeholder="Ex: 99,90" inputmode="decimal" autocomplete="off">
        </div>
        <div class="field">
          <label>Categoria</label>
          <input id="inCategoria" placeholder="Ex: casa" autocomplete="off">
        </div>
        <div class="field">
          <label>Dia de vencimento</label>
          <input id="inDia" placeholder="1-31" inputmode="numeric" autocomplete="off">
        </div>
      </div>

      <div class="rowBtns">
        <button class="btn primary" id="btnAdd" onclick="addOrUpdate()">Salvar fixo</button>
        <button class="btn ghost" onclick="clearForm()">Limpar</button>
        <button class="btn ghost" onclick="requestNotifs()">Ativar notificações</button>
      </div>

      <div class="small" style="margin-top:10px">
        Comandos por voz (exemplos): <b>anote gastos fixos internet 99 casa</b> • <b>remover gasto fixo internet</b>
      </div>

      <hr class="sep">

      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
        <div style="font-weight:950">Seus fixos</div>
        <div class="small" id="totais">—</div>
      </div>

      <div class="list" id="list"></div>
    </div>
  </div>
</div>

<div id="debugBox"></div>

<script>
function dbg(msg){
  const box = document.getElementById("debugBox");
  if(!box) return;
  box.style.display = "block";
  box.textContent = String(msg);
}
window.addEventListener("error", (e)=>{
  dbg("Erro JS:\n" + (e.message || e.type) + "\n" + (e.filename||"") + ":" + (e.lineno||"") + ":" + (e.colno||""));
});
window.addEventListener("unhandledrejection", (e)=>{
  dbg("Promise rejeitada:\n" + (e.reason && (e.reason.code || e.reason.message) ? (e.reason.code + " - " + e.reason.message) : String(e.reason)));
});
</script>

<script>
/* ========= Storage ========= */
const FIXOS_KEY = "gastos_fixos_v1";
const VOICE_CMD_KEY = "voice_cmd";
const VOICE_TS_KEY  = "voice_ts";

function nowISO(){ return new Date().toISOString(); }

function setStatus(t, ok){
  document.getElementById("status").textContent = t;
  document.getElementById("dot").classList.toggle("ok", !!ok);
}
function normalize(text){
  return String(text || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}
function toNumberBR(v){
  const s = String(v || "").trim().replace(/\./g,"").replace(",",".").replace(/[^\d.]/g,"");
  const n = Number(s);
  return Number.isFinite(n) ? n : NaN;
}
function fmtBRL(n){
  try{ return n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
  catch(e){ return "R$ " + (Math.round((n||0)*100)/100).toFixed(2).replace(".",","); }
}

function loadFixos(){
  try{
    const raw = localStorage.getItem(FIXOS_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  }catch(e){ return []; }
}
function saveFixos(arr){
  localStorage.setItem(FIXOS_KEY, JSON.stringify(arr || []));
}
function uid(){
  return "fx_" + Math.random().toString(36).slice(2) + "_" + Date.now().toString(36);
}

/* ========= UI ========= */
let editingId = null;

function clearForm(){
  editingId = null;
  document.getElementById("inNome").value = "";
  document.getElementById("inValor").value = "";
  document.getElementById("inCategoria").value = "";
  document.getElementById("inDia").value = "";
  document.getElementById("btnAdd").textContent = "Salvar fixo";
  setStatus("Pronto", true);
}

function fillForm(item){
  editingId = item.id;
  document.getElementById("inNome").value = item.nome || "";
  document.getElementById("inValor").value = (item.valor != null ? String(item.valor).replace(".", ",") : "");
  document.getElementById("inCategoria").value = item.categoria || "";
  document.getElementById("inDia").value = item.dia != null ? String(item.dia) : "";
  document.getElementById("btnAdd").textContent = "Atualizar fixo";
  setStatus("Editando…", true);
  window.scrollTo({top:0,behavior:"smooth"});
}

function addOrUpdate(){
  const nome = String(document.getElementById("inNome").value || "").trim();
  const valor = toNumberBR(document.getElementById("inValor").value);
  const categoria = String(document.getElementById("inCategoria").value || "").trim();
  const dia = Number(String(document.getElementById("inDia").value || "").trim());

  if(!nome){ setStatus("Informe o nome.", false); return; }
  if(!Number.isFinite(valor) || valor <= 0){ setStatus("Informe um valor válido.", false); return; }
  if(!categoria){ setStatus("Informe a categoria.", false); return; }
  if(!Number.isFinite(dia) || dia < 1 || dia > 31){ setStatus("Informe o dia (1-31).", false); return; }

  const arr = loadFixos();
  const base = {
    nome,
    valor: Math.round(valor*100)/100,
    categoria,
    dia,
    status: "pendente",        // pendente | pago
    updatedAt: nowISO()
  };

  if(editingId){
    const idx = arr.findIndex(x=>x.id===editingId);
    if(idx>=0){
      arr[idx] = { ...arr[idx], ...base };
      saveFixos(arr);
      setStatus("Atualizado!", true);
      render();
      clearForm();
      return;
    }
  }

  arr.push({ id: uid(), createdAt: nowISO(), ...base });
  saveFixos(arr);
  setStatus("Salvo!", true);
  render();
  clearForm();
}

function removeByName(nome){
  const n = normalize(nome);
  const arr = loadFixos();
  const idx = arr.findIndex(x=> normalize(x.nome) === n);
  if(idx < 0){ setStatus("Não achei esse fixo.", false); return false; }
  arr.splice(idx,1);
  saveFixos(arr);
  setStatus("Removido!", true);
  render();
  return true;
}

function setItemStatus(id, status){
  const arr = loadFixos();
  const idx = arr.findIndex(x=>x.id===id);
  if(idx<0) return;
  arr[idx].status = status;
  arr[idx].updatedAt = nowISO();
  saveFixos(arr);
  render();
}

function render(){
  const list = document.getElementById("list");
  const arr = loadFixos()
    .slice()
    .sort((a,b)=>{
      const da = Number(a.dia||0), db = Number(b.dia||0);
      if(da !== db) return da - db;
      return normalize(a.nome).localeCompare(normalize(b.nome));
    });

  const total = arr.reduce((s,x)=>s+(Number(x.valor)||0),0);
  const pagos = arr.filter(x=>x.status==="pago").reduce((s,x)=>s+(Number(x.valor)||0),0);
  document.getElementById("totais").textContent =
    `Itens: ${arr.length} • Total: ${fmtBRL(total)} • Pagos: ${fmtBRL(pagos)}`;

  if(!arr.length){
    list.innerHTML = `
      <div class="item">
        <div class="itemName">Nenhum gasto fixo ainda</div>
        <div class="itemMeta">Adicione acima ou use voz: <b>anote gastos fixos internet 99 casa</b></div>
      </div>`;
    return;
  }

  list.innerHTML = arr.map(x=>{
    const st = x.status === "pago" ? "Pago" : "Pendente";
    const badgeClass = x.status === "pago" ? "ok" : "warn";
    return `
      <div class="item">
        <div class="itemTop">
          <div style="min-width:0">
            <div class="itemName">${escapeHtml(x.nome || "")}</div>
            <div class="itemMeta">
              ${fmtBRL(Number(x.valor)||0)} • Categoria: <b>${escapeHtml(x.categoria||"")}</b> • Vence dia <b>${Number(x.dia)||"—"}</b>
            </div>
          </div>
          <button class="btn ghost danger" onclick="removeId('${x.id}')">✕</button>
        </div>

        <div class="badges">
          <span class="badge ${badgeClass}">${st}</span>
          <span class="badge neutral">Atualizado: ${escapeHtml((x.updatedAt||x.createdAt||"").slice(0,19).replace("T"," "))}</span>
        </div>

        <div class="itemActions">
          <button class="btn ghost" onclick="editId('${x.id}')">Editar</button>
          <button class="btn ghost" onclick="setItemStatus('${x.id}','pendente')">Marcar pendente</button>
          <button class="btn ghost" onclick="setItemStatus('${x.id}','pago')">Marcar pago</button>
        </div>
      </div>
    `;
  }).join("");
}

function editId(id){
  const arr = loadFixos();
  const it = arr.find(x=>x.id===id);
  if(!it) return;
  fillForm(it);
}
function removeId(id){
  const arr = loadFixos();
  const idx = arr.findIndex(x=>x.id===id);
  if(idx<0) return;
  const name = arr[idx].nome || "este item";
  if(!confirm(`Remover "${name}"?`)) return;
  arr.splice(idx,1);
  saveFixos(arr);
  setStatus("Removido!", true);
  render();
}

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* ========= Voice bridge (fixos.html executa comandos específicos) ========= */
function consumeVoiceCmd(){
  const raw = localStorage.getItem(VOICE_CMD_KEY);
  if(!raw) return;

  // Consome para não repetir
  localStorage.removeItem(VOICE_CMD_KEY);
  localStorage.removeItem(VOICE_TS_KEY);

  const cmd = normalize(raw);

  // anote gastos fixos internet 99 casa
  if((cmd.startsWith("anote") || cmd.startsWith("anotar")) && cmd.includes("gastos fixos")){
    // pega tudo depois de "gastos fixos"
    const after = normalize(raw).split("gastos fixos")[1] ? raw.split(/gastos fixos/i)[1].trim() : "";
    const parts = after.split(/\s+/).filter(Boolean);

    // tenta achar um número (valor)
    let valIdx = -1;
    for(let i=0;i<parts.length;i++){
      if(toNumberBR(parts[i]).toString() !== "NaN"){ valIdx = i; break; }
    }
    if(valIdx === -1 || valIdx === 0 || valIdx === parts.length-1){
      setStatus("Comando incompleto. Ex: anote gastos fixos internet 99 casa", false);
      return;
    }

    const nome = parts.slice(0, valIdx).join(" ");
    const valor = toNumberBR(parts[valIdx]);
    const categoria = parts.slice(valIdx+1).join(" ");

    // dia: se existir um número no final entre 1-31, usa. Senão mantém o que está no formulário ou 1.
    let dia = Number(document.getElementById("inDia").value || "");
    if(!(dia>=1 && dia<=31)) dia = 1;

    document.getElementById("inNome").value = nome;
    document.getElementById("inValor").value = String(valor).replace(".", ",");
    document.getElementById("inCategoria").value = categoria;
    document.getElementById("inDia").value = String(dia);

    addOrUpdate();
    setStatus("Anotado por voz!", true);
    return;
  }

  // remover gasto fixo internet
  if(cmd.startsWith("remover gasto fixo") || cmd.startsWith("apagar gasto fixo") || cmd.startsWith("excluir gasto fixo")){
    const nome = raw.replace(/^(remover|apagar|excluir)\s+gasto\s+fixo\s+/i, "").trim();
    if(!nome){
      setStatus("Diga o nome. Ex: remover gasto fixo internet", false);
      return;
    }
    const ok = removeByName(nome);
    if(ok) setStatus("Removido por voz!", true);
    return;
  }

  // Se cair aqui, não era para fixos.html
  setStatus("Comando recebido (não aplicado aqui).", false);
}

/* ========= Notificações (local, sem push) ========= */
async function requestNotifs(){
  try{
    if(!("Notification" in window)){
      alert("Notificações não suportadas neste navegador.");
      return;
    }
    const p = await Notification.requestPermission();
    if(p !== "granted"){
      alert("Permissão negada.");
      return;
    }
    alert("Notificações ativadas. (Avisos locais dependem do navegador/PWA)");
    setStatus("Notificações ok", true);
  }catch(e){
    dbg("Notificações: " + (e && e.message ? e.message : String(e)));
  }
}

document.addEventListener("DOMContentLoaded", ()=>{
  setStatus("Pronto", true);
  render();
  // executa comando que veio do voz.html (se houver)
  consumeVoiceCmd();
});
</script>
</body>
</html>
